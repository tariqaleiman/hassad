<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#1B5E20"/>
  <rect width="200" height="200" rx="40" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Wheat stalk -->
  <line x1="100" y1="160" x2="100" y2="60" stroke="#F9A825" stroke-width="5" stroke-linecap="round"/>
  <!-- Wheat grains left -->
  <ellipse cx="82" cy="90" rx="13" ry="7" fill="#F9A825" transform="rotate(-35,82,90)"/>
  <ellipse cx="79" cy="108" rx="13" ry="7" fill="#F9A825" transform="rotate(-30,79,108)"/>
  <ellipse cx="80" cy="126" rx="12" ry="6" fill="#F9A825" transform="rotate(-25,80,126)"/>
  <!-- Wheat grains right -->
  <ellipse cx="118" cy="90" rx="13" ry="7" fill="#F9A825" transform="rotate(35,118,90)"/>
  <ellipse cx="121" cy="108" rx="13" ry="7" fill="#F9A825" transform="rotate(30,121,108)"/>
  <ellipse cx="120" cy="126" rx="12" ry="6" fill="#F9A825" transform="rotate(25,120,126)"/>
  <!-- Top grain -->
  <ellipse cx="100" cy="70" rx="8" ry="14" fill="#F9A825"/>
  <!-- Arabic text حصاد -->
  <text x="100" y="185" text-anchor="middle" font-family="Cairo,Arial" font-size="28" font-weight="900" fill="#F9A825" letter-spacing="2">حصاد</text>
</svg>